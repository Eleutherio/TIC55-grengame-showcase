name: Keepalive Render Backend

on:
  schedule:
    # BRT (UTC-3): seg-sex, 08:00-20:59, a cada 10 min
    - cron: "*/10 11-23 * * 1-5"
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint with retry
        run: |
          URL="https://grengame-backend.onrender.com/health/"
          MAX_RETRIES=5
          RETRY_DELAY=15
          SUCCESS=false

          for i in $(seq 1 $MAX_RETRIES); do
            echo "🔁 Attempt $i of $MAX_RETRIES..."

            HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" \
              --max-time 40 \
              --connect-timeout 10 \
              "$URL")

            echo "   HTTP status: $HTTP_CODE"

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              echo "✅ Backend is alive (HTTP $HTTP_CODE)"
              SUCCESS=true
              break
            else
              echo "⚠️  Got HTTP $HTTP_CODE — waiting ${RETRY_DELAY}s before retry..."
              sleep $RETRY_DELAY
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "❌ Backend did not respond after $MAX_RETRIES attempts."
            exit 1
          fi

