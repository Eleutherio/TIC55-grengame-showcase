
services:
  postgres:
    image: postgres:15-alpine
    container_name: grengame-postgres
    restart: unless-stopped
    env_file:
      - ./grengame-backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-grengame-backend}:${BACKEND_TAG:-dev}
    build: ./grengame-backend
    container_name: grengame-backend
    restart: unless-stopped
    env_file:
      - ./grengame-backend/.env
    command: >
      sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./grengame-backend:/app
      - backend_media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://grengame:grengame123@postgres:5432/grengame}
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - MAILERSEND_API_KEY=${MAILERSEND_API_KEY}
      - MAILERSEND_TEMPLATE_ID=${MAILERSEND_TEMPLATE_ID}
      - MAILERSEND_FROM_EMAIL=${MAILERSEND_FROM_EMAIL}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: ${FRONTEND_IMAGE:-grengame-frontend}:${FRONTEND_TAG:-dev}
    build: ./grengame-frontend
    container_name: grengame-frontend
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./grengame-frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5173/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  backend_media:
